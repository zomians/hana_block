<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -100 1660 1700" width="900" height="925">
  <title>花ブロック 4×4 鏡映タイリング (案A 外35/内35)</title>

  <defs>
    <symbol id="block-A" viewBox="0 0 390 390" overflow="hidden">
      <g transform="rotate(90 195 195)">
        <rect x="17.5" y="17.5" width="355" height="355" fill="none" stroke="#000" stroke-width="35"/>
        <line x1="390" y1="0" x2="0" y2="390" stroke="#000" stroke-width="35"/>
        <line x1="0"   y1="0"   x2="114.228" y2="114.228" stroke="#000" stroke-width="35"/>
        <line x1="390" y1="0"   x2="114.228" y2="114.228" stroke="#000" stroke-width="35"/>
        <line x1="0"   y1="390" x2="114.228" y2="114.228" stroke="#000" stroke-width="35"/>
        <line x1="390" y1="0"   x2="275.772" y2="275.772" stroke="#000" stroke-width="35"/>
        <line x1="390" y1="390" x2="275.772" y2="275.772" stroke="#000" stroke-width="35"/>
        <line x1="0"   y1="390" x2="275.772" y2="275.772" stroke="#000" stroke-width="35"/>
      </g>
    </symbol>
  </defs>

  <!-- タイトル -->
  <text x="780" y="-60" text-anchor="middle" font-size="32" font-family="sans-serif" font-weight="bold">花ブロック 4×4 鏡映タイリング</text>
  <text x="780" y="-25" text-anchor="middle" font-size="16" font-family="sans-serif" fill="#666">案A: 外35 / 内35 mm ／ 開口率 34.5% ／ 1ブロック 390×390mm ／ 全体 1560×1560mm</text>

  <!-- ============================ -->
  <!-- 4×4 タイリング 16ブロック -->
  <!-- 2×2 鏡映 (TL=原, TR=H, BL=V, BR=HV) を 2×2 セル分繰り返し -->
  <!-- ============================ -->

  <!-- Row 0 (y=0..390) -->
  <use href="#block-A" x="0"   y="0" width="390" height="390"/>
  <g transform="translate(780, 0) scale(-1, 1)"><use href="#block-A" width="390" height="390"/></g>
  <use href="#block-A" x="780" y="0" width="390" height="390"/>
  <g transform="translate(1560, 0) scale(-1, 1)"><use href="#block-A" width="390" height="390"/></g>

  <!-- Row 1 (y=390..780) -->
  <g transform="translate(0,    780) scale( 1,-1)"><use href="#block-A" width="390" height="390"/></g>
  <g transform="translate(780,  780) scale(-1,-1)"><use href="#block-A" width="390" height="390"/></g>
  <g transform="translate(780,  780) scale( 1,-1)"><use href="#block-A" width="390" height="390"/></g>
  <g transform="translate(1560, 780) scale(-1,-1)"><use href="#block-A" width="390" height="390"/></g>

  <!-- Row 2 (y=780..1170) -->
  <use href="#block-A" x="0"   y="780" width="390" height="390"/>
  <g transform="translate(780, 780) scale(-1, 1)"><use href="#block-A" width="390" height="390"/></g>
  <use href="#block-A" x="780" y="780" width="390" height="390"/>
  <g transform="translate(1560,780) scale(-1, 1)"><use href="#block-A" width="390" height="390"/></g>

  <!-- Row 3 (y=1170..1560) -->
  <g transform="translate(0,    1560) scale( 1,-1)"><use href="#block-A" width="390" height="390"/></g>
  <g transform="translate(780,  1560) scale(-1,-1)"><use href="#block-A" width="390" height="390"/></g>
  <g transform="translate(780,  1560) scale( 1,-1)"><use href="#block-A" width="390" height="390"/></g>
  <g transform="translate(1560, 1560) scale(-1,-1)"><use href="#block-A" width="390" height="390"/></g>

  <!-- 外形参照（破線、最前面） -->
  <rect x="0" y="0" width="1560" height="1560" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="10,6"/>
  <!-- ブロック境界 (細破線) -->
  <line x1="390"  y1="0" x2="390"  y2="1560" stroke="#999" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="780"  y1="0" x2="780"  y2="1560" stroke="#999" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="1170" y1="0" x2="1170" y2="1560" stroke="#999" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="0" y1="390"  x2="1560" y2="390"  stroke="#999" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="0" y1="780"  x2="1560" y2="780"  stroke="#999" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="0" y1="1170" x2="1560" y2="1170" stroke="#999" stroke-width="0.5" stroke-dasharray="3,4"/>
</svg>
