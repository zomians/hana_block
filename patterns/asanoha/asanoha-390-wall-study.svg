<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 -120 1780 1020" width="1200" height="700">
  <title>花ブロック 2×2鏡映タイリング比較 (案A 35/35, 案B 25/50) — 原図 90°CW</title>

  <defs>
    <!-- 案B: 外25 / 内50 (原図 90°時計回り回転) -->
    <symbol id="block-B" viewBox="0 0 390 390" overflow="hidden">
      <g transform="rotate(90 195 195)">
        <rect x="12.5" y="12.5" width="365" height="365" fill="none" stroke="#000" stroke-width="25"/>
        <line x1="390" y1="0" x2="0" y2="390" stroke="#000" stroke-width="50"/>
        <line x1="0"   y1="0"   x2="114.228" y2="114.228" stroke="#000" stroke-width="50"/>
        <line x1="390" y1="0"   x2="114.228" y2="114.228" stroke="#000" stroke-width="50"/>
        <line x1="0"   y1="390" x2="114.228" y2="114.228" stroke="#000" stroke-width="50"/>
        <line x1="390" y1="0"   x2="275.772" y2="275.772" stroke="#000" stroke-width="50"/>
        <line x1="390" y1="390" x2="275.772" y2="275.772" stroke="#000" stroke-width="50"/>
        <line x1="0"   y1="390" x2="275.772" y2="275.772" stroke="#000" stroke-width="50"/>
      </g>
    </symbol>

    <!-- 案A: 外35 / 内35 (原図 90°時計回り回転) -->
    <symbol id="block-A" viewBox="0 0 390 390" overflow="hidden">
      <g transform="rotate(90 195 195)">
        <rect x="17.5" y="17.5" width="355" height="355" fill="none" stroke="#000" stroke-width="35"/>
        <line x1="390" y1="0" x2="0" y2="390" stroke="#000" stroke-width="35"/>
        <line x1="0"   y1="0"   x2="114.228" y2="114.228" stroke="#000" stroke-width="35"/>
        <line x1="390" y1="0"   x2="114.228" y2="114.228" stroke="#000" stroke-width="35"/>
        <line x1="0"   y1="390" x2="114.228" y2="114.228" stroke="#000" stroke-width="35"/>
        <line x1="390" y1="0"   x2="275.772" y2="275.772" stroke="#000" stroke-width="35"/>
        <line x1="390" y1="390" x2="275.772" y2="275.772" stroke="#000" stroke-width="35"/>
        <line x1="0"   y1="390" x2="275.772" y2="275.772" stroke="#000" stroke-width="35"/>
      </g>
    </symbol>
  </defs>

  <!-- タイトル -->
  <text x="830" y="-80" text-anchor="middle" font-size="36" font-family="sans-serif" font-weight="bold">花ブロック 2×2 鏡映タイリング比較</text>
  <text x="830" y="-45" text-anchor="middle" font-size="18" font-family="sans-serif" fill="#666">原図 90°時計回り回転 / TL=原図 / TR=水平鏡映 / BL=垂直鏡映 / BR=両方鏡映 — 1ブロック 390×390mm</text>

  <!-- 案B の 2×2 -->
  <g transform="translate(880, 0)">
    <use href="#block-B" x="0" y="0" width="390" height="390"/>
    <g transform="translate(780, 0) scale(-1, 1)">
      <use href="#block-B" width="390" height="390"/>
    </g>
    <g transform="translate(0, 780) scale(1, -1)">
      <use href="#block-B" width="390" height="390"/>
    </g>
    <g transform="translate(780, 780) scale(-1, -1)">
      <use href="#block-B" width="390" height="390"/>
    </g>

    <rect x="0" y="0" width="780" height="780" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="8,5"/>
    <line x1="390" y1="0" x2="390" y2="780" stroke="#888" stroke-width="0.6" stroke-dasharray="3,4"/>
    <line x1="0" y1="390" x2="780" y2="390" stroke="#888" stroke-width="0.6" stroke-dasharray="3,4"/>

    <text x="390" y="830" text-anchor="middle" font-size="26" font-family="sans-serif" font-weight="bold">案B: 外25 / 内50 (開口率 28.0%)</text>
    <text x="390" y="865" text-anchor="middle" font-size="16" font-family="sans-serif" fill="#444">タイル接合幅 50mm ＝ 内壁 50mm（統一）</text>
  </g>

  <!-- 案A の 2×2 -->
  <g transform="translate(0, 0)">
    <use href="#block-A" x="0" y="0" width="390" height="390"/>
    <g transform="translate(780, 0) scale(-1, 1)">
      <use href="#block-A" width="390" height="390"/>
    </g>
    <g transform="translate(0, 780) scale(1, -1)">
      <use href="#block-A" width="390" height="390"/>
    </g>
    <g transform="translate(780, 780) scale(-1, -1)">
      <use href="#block-A" width="390" height="390"/>
    </g>

    <rect x="0" y="0" width="780" height="780" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="8,5"/>
    <line x1="390" y1="0" x2="390" y2="780" stroke="#888" stroke-width="0.6" stroke-dasharray="3,4"/>
    <line x1="0" y1="390" x2="780" y2="390" stroke="#888" stroke-width="0.6" stroke-dasharray="3,4"/>

    <text x="390" y="830" text-anchor="middle" font-size="26" font-family="sans-serif" font-weight="bold">案A: 外35 / 内35 (開口率 34.5%)</text>
    <text x="390" y="865" text-anchor="middle" font-size="16" font-family="sans-serif" fill="#000">タイル接合幅 70mm ／ 内壁 35mm（不揃い）</text>
  </g>
</svg>
