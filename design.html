<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>花ブロック 設計図</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #d9d9d9; }
  body { font-family: 'Noto Sans JP', sans-serif; color: #111; -webkit-font-smoothing: antialiased; }

  @page { size: A3 landscape; margin: 0; }
  @media print {
    body { background: white; }
    .sheet-wrap { padding: 0; }
    .sheet { box-shadow: none; margin: 0; }
  }

  .sheet-wrap {
    padding: 32px 0 64px;
    display: flex;
    justify-content: center;
  }

  /* A3 landscape */
  .sheet {
    width: 420mm;
    height: 297mm;
    flex: none;
    flex-shrink: 0;
    background: #ffffff;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    padding: 14mm 18mm 12mm 18mm;
    display: flex;
    flex-direction: column;
    gap: 6mm;
  }

  /* ===== HEADER: spec table top-right only ===== */
  .top-row {
    display: flex;
    justify-content: flex-end;
    min-height: 26mm;
  }

  .spec {
    font-size: 3.2mm;
    line-height: 1.55;
    border: 0.35mm solid #111;
  }
  .spec table { border-collapse: collapse; }
  .spec td {
    padding: 1.6mm 4mm;
    border-bottom: 0.2mm solid #bbb;
    white-space: nowrap;
  }
  .spec tr:last-child td { border-bottom: none; }
  .spec td:first-child {
    color: #555;
    border-right: 0.2mm solid #bbb;
    font-weight: 500;
    width: 18mm;
  }
  .spec td:last-child { font-weight: 500; }

  /* ===== TWO MAIN VIEWS ===== */
  .views {
    flex: 1 1 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10mm;
    min-height: 0;
  }

  .view {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .view-head {
    display: flex;
    align-items: baseline;
    gap: 4mm;
    margin-bottom: 3mm;
    font-size: 4.6mm;
    font-weight: 500;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .view-head .scale {
    font-size: 3mm;
    color: #666;
    font-weight: 400;
    margin-left: auto;
    white-space: nowrap;
  }

  .view svg {
    width: 100%;
    height: 100%;
    display: block;
    flex: 1 1 0;
    min-height: 0;
  }

  /* ===== FOOTER ===== */
  .foot {
    text-align: center;
    padding-top: 4mm;
    border-top: 0.35mm solid #111;
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 10mm;
  }
  .foot h1 {
    margin: 0;
    font-size: 6mm;
    font-weight: 500;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .foot .meta {
    font-size: 3mm;
    color: #666;
    letter-spacing: 0.04em;
  }

  /* SVG text */
  svg text { font-family: 'Noto Sans JP', sans-serif; }
  .dim     { font-size: 22px; font-weight: 700; fill: #111; }
  .dim-sm  { font-size: 18px; font-weight: 700; fill: #111; }
  .tile-lab{ font-size: 30px; font-weight: 500; fill: #888; letter-spacing: 0.06em; }
  .note    { font-size: 17px; font-weight: 500; fill: #222; }
  .note-sub{ font-size: 14px; font-weight: 400; fill: #555; }
</style>
</head>
<body>

<div class="sheet-wrap">
  <div class="sheet">

    <!-- =============== TOP ROW: spec table =============== -->
    <div class="top-row">
      <div class="spec">
        <table>
          <tr><td>寸 法</td><td>390 × 390 × 100 mm</td></tr>
          <tr><td>壁 厚</td><td>35 mm</td></tr>
          <tr><td>開口率</td><td>約 34.5%</td></tr>
          <tr><td>材 質</td><td>コンクリート</td></tr>
        </table>
      </div>
    </div>

    <!-- =============== MAIN VIEWS =============== -->
    <main class="views">

      <!-- =========== 単体正面図 =========== -->
      <section class="view">
        <div class="view-head">
          <span>単体正面図</span>
          <span class="scale">縮尺 1 : 3.5</span>
        </div>

        <!-- Square viewBox: 390 block + 130 padding each side = 650x650, scaled so block=block/svg=0.6 -->
        <!-- Use same scaling factor as tile for visual parity -->
        <svg viewBox="-130 -130 650 650" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrF" viewBox="0 0 10 10" refX="9" refY="5"
                    markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill="#111"/>
            </marker>
            <marker id="arrF-in" viewBox="0 0 10 10" refX="1" refY="5"
                    markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M10,0 L0,5 L10,10 z" fill="#111"/>
            </marker>
            <clipPath id="clipF"><rect x="0" y="0" width="390" height="390"/></clipPath>
            <clipPath id="innerF"><rect x="35" y="35" width="320" height="320"/></clipPath>
          </defs>

          <!-- block geometry (枠線レンダリング) -->
          <g clip-path="url(#clipF)">
            <rect x="0" y="0" width="390" height="390" fill="#ffffff"/>
            <!-- 外周壁の内縁 -->
            <rect x="35" y="35" width="320" height="320" fill="none" stroke="#111" stroke-width="1"/>
            <!-- 内壁: double-stroke (黒枠+白抜き) ／ 内部領域にクリップ -->
            <g clip-path="url(#innerF)">
              <g stroke-linecap="butt" fill="none">
                <g stroke="#111" stroke-width="37">
                  <line x1="0" y1="0" x2="390" y2="390"/>
                  <line x1="0" y1="0" x2="275.772" y2="114.228"/>
                  <line x1="390" y1="0" x2="275.772" y2="114.228"/>
                  <line x1="390" y1="390" x2="275.772" y2="114.228"/>
                  <line x1="0" y1="0" x2="114.228" y2="275.772"/>
                  <line x1="0" y1="390" x2="114.228" y2="275.772"/>
                  <line x1="390" y1="390" x2="114.228" y2="275.772"/>
                </g>
                <g stroke="#fff" stroke-width="35">
                  <line x1="0" y1="0" x2="390" y2="390"/>
                  <line x1="0" y1="0" x2="275.772" y2="114.228"/>
                  <line x1="390" y1="0" x2="275.772" y2="114.228"/>
                  <line x1="390" y1="390" x2="275.772" y2="114.228"/>
                  <line x1="0" y1="0" x2="114.228" y2="275.772"/>
                  <line x1="0" y1="390" x2="114.228" y2="275.772"/>
                  <line x1="390" y1="390" x2="114.228" y2="275.772"/>
                </g>
              </g>
            </g>
          </g>

          <!-- outer outline -->
          <rect x="0" y="0" width="390" height="390"
                fill="none" stroke="#111" stroke-width="1.6"/>

          <!-- Incenter points -->
          <g fill="#111">
            <circle cx="275.772" cy="114.228" r="2.5"/>
            <circle cx="114.228" cy="275.772" r="2.5"/>
          </g>

          <!-- ====== DIMENSIONS ====== -->
          <!-- Overall width 390 (top, main) -->
          <g stroke="#111" stroke-width="0.7" fill="none">
            <line x1="0"   y1="-58" x2="0"   y2="-6"/>
            <line x1="390" y1="-58" x2="390" y2="-6"/>
            <line x1="0"   y1="-40" x2="390" y2="-40"
                  marker-start="url(#arrF-in)" marker-end="url(#arrF)"/>
          </g>
          <text x="195" y="-46" text-anchor="middle" class="dim">390</text>

          <!-- Wall thickness 35 (top-left small) -->
          <g stroke="#111" stroke-width="0.7" fill="none">
            <line x1="0"  y1="-20" x2="0"  y2="-6"/>
            <line x1="35" y1="-20" x2="35" y2="-6"/>
            <line x1="-14" y1="-13" x2="49" y2="-13"
                  marker-start="url(#arrF-in)" marker-end="url(#arrF)"/>
          </g>
          <text x="60" y="-9" class="dim-sm">35</text>

          <!-- Overall height 390 (left) -->
          <g stroke="#111" stroke-width="0.7" fill="none">
            <line x1="-70" y1="0"   x2="-6"  y2="0"/>
            <line x1="-70" y1="390" x2="-6"  y2="390"/>
            <line x1="-52" y1="0"   x2="-52" y2="390"
                  marker-start="url(#arrF-in)" marker-end="url(#arrF)"/>
          </g>
          <text x="-58" y="200" text-anchor="middle" class="dim"
                transform="rotate(-90 -58 200)">390</text>

          <!-- Wall thickness 35 (left small) -->
          <g stroke="#111" stroke-width="0.7" fill="none">
            <line x1="-20" y1="0"   x2="-6"  y2="0"/>
            <line x1="-20" y1="35"  x2="-6"  y2="35"/>
            <line x1="-13" y1="-14" x2="-13" y2="49"
                  marker-start="url(#arrF-in)" marker-end="url(#arrF)"/>
          </g>
          <text x="-18" y="60" text-anchor="end" class="dim-sm">35</text>

          <!-- Incenter x = 275.772 (top, second tier) -->
          <g stroke="#111" stroke-width="0.7" fill="none">
            <line x1="275.772" y1="115" x2="275.772" y2="-82"/>
            <line x1="0"       y1="-74" x2="275.772" y2="-74"
                  marker-start="url(#arrF-in)" marker-end="url(#arrF)"/>
          </g>
          <text x="137.886" y="-78" text-anchor="middle" class="dim-sm">275.772</text>
        </svg>
      </section>

      <!-- =========== 2×2 タイリング図 =========== -->
      <section class="view">
        <div class="view-head">
          <span>2×2 タイリング図</span>
          <span class="scale">縮尺 1 : 7</span>
        </div>

        <!-- viewBox: 780x780 block + 130 padding each side = 1040x1040 (same aspect as front) -->
        <svg viewBox="-130 -130 1040 1040" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrT" viewBox="0 0 10 10" refX="9" refY="5"
                    markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill="#111"/>
            </marker>
            <marker id="arrT-in" viewBox="0 0 10 10" refX="1" refY="5"
                    markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M10,0 L0,5 L10,10 z" fill="#111"/>
            </marker>

            <clipPath id="clipT"><rect x="0" y="0" width="390" height="390"/></clipPath>
            <clipPath id="innerT"><rect x="35" y="35" width="320" height="320"/></clipPath>

            <symbol id="hana" overflow="visible">
              <g clip-path="url(#clipT)">
                <rect x="0" y="0" width="390" height="390" fill="#ffffff"/>
                <rect x="35" y="35" width="320" height="320" fill="none" stroke="#111" stroke-width="1"/>
                <g clip-path="url(#innerT)">
                  <g stroke-linecap="butt" fill="none">
                    <g stroke="#111" stroke-width="37">
                      <line x1="0" y1="0" x2="390" y2="390"/>
                      <line x1="0" y1="0" x2="275.772" y2="114.228"/>
                      <line x1="390" y1="0" x2="275.772" y2="114.228"/>
                      <line x1="390" y1="390" x2="275.772" y2="114.228"/>
                      <line x1="0" y1="0" x2="114.228" y2="275.772"/>
                      <line x1="0" y1="390" x2="114.228" y2="275.772"/>
                      <line x1="390" y1="390" x2="114.228" y2="275.772"/>
                    </g>
                    <g stroke="#fff" stroke-width="35">
                      <line x1="0" y1="0" x2="390" y2="390"/>
                      <line x1="0" y1="0" x2="275.772" y2="114.228"/>
                      <line x1="390" y1="0" x2="275.772" y2="114.228"/>
                      <line x1="390" y1="390" x2="275.772" y2="114.228"/>
                      <line x1="0" y1="0" x2="114.228" y2="275.772"/>
                      <line x1="0" y1="390" x2="114.228" y2="275.772"/>
                      <line x1="390" y1="390" x2="114.228" y2="275.772"/>
                    </g>
                  </g>
                </g>
              </g>
            </symbol>
          </defs>

          <!-- 4 mirrored tiles, no gap -->
          <use href="#hana" x="0" y="0"/>
          <g transform="translate(780,0) scale(-1,1)"><use href="#hana"/></g>
          <g transform="translate(0,780) scale(1,-1)"><use href="#hana"/></g>
          <g transform="translate(780,780) scale(-1,-1)"><use href="#hana"/></g>

          <!-- Block boundary dashed lines -->
          <g stroke="#111" stroke-width="0.8" fill="none" stroke-dasharray="9 6" opacity="1">
            <line x1="390" y1="0" x2="390" y2="780"/>
            <line x1="0" y1="390" x2="780" y2="390"/>
          </g>

          <!-- Outer outline -->
          <rect x="0" y="0" width="780" height="780"
                fill="none" stroke="#111" stroke-width="1.6"/>

          <!-- TL / TR / BL / BR labels -->
          <g class="tile-lab">
            <text x="20" y="46">TL</text>
            <text x="760" y="46" text-anchor="end">TR</text>
            <text x="20" y="762">BL</text>
            <text x="760" y="762" text-anchor="end">BR</text>
          </g>

          <!-- Overall width 780 (top) -->
          <g stroke="#111" stroke-width="0.7" fill="none">
            <line x1="0"   y1="-58" x2="0"   y2="-6"/>
            <line x1="780" y1="-58" x2="780" y2="-6"/>
            <line x1="0"   y1="-40" x2="780" y2="-40"
                  marker-start="url(#arrT-in)" marker-end="url(#arrT)"/>
          </g>
          <text x="390" y="-46" text-anchor="middle" class="dim">780</text>

          <!-- Overall height 780 (left) -->
          <g stroke="#111" stroke-width="0.7" fill="none">
            <line x1="-70" y1="0"   x2="-6"  y2="0"/>
            <line x1="-70" y1="780" x2="-6"  y2="780"/>
            <line x1="-52" y1="0"   x2="-52" y2="780"
                  marker-start="url(#arrT-in)" marker-end="url(#arrT)"/>
          </g>
          <text x="-58" y="390" text-anchor="middle" class="dim"
                transform="rotate(-90 -58 390)">780</text>

          <!-- Joint callout 35+35 = 70 -->
          <g stroke="#111" stroke-width="0.7" fill="none">
            <line x1="390" y1="195" x2="640" y2="60"/>
          </g>
          <g transform="translate(648,42)">
            <rect x="0" y="-22" width="270" height="58"
                  fill="#fff" stroke="#111" stroke-width="0.4"/>
            <text x="12" y="-4" class="note-sub">接合面の壁厚</text>
            <text x="12" y="24" class="note" font-size="22" font-weight="700">35 + 35 = 70 mm</text>
          </g>
        </svg>
      </section>

    </main>

    <!-- =============== FOOTER =============== -->
    <footer class="foot">
      <h1>花ブロック 設計図 — 390 × 390 × 100</h1>
      <span class="meta">2026.05.16</span>
    </footer>

  </div>
</div>

</body>
</html>
